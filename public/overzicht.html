<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Overview | Healthify</title>

    <meta name="theme-color" content="#22c55e" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="public/css/style.css" />
    <link rel="apple-touch-icon" href="icons/appicon.png" />
  </head>

  <body>
    <header>
      <h1>💚 Healthify</h1>
      <p data-translate="overviewSubtitle">View your saved health data</p>
    </header>

    <nav>
      <a href="index.html" data-translate="home">Home</a>
      <a href="toevoegen.html" data-translate="add">Add</a>
      <a href="overzicht.html" data-translate="overview">Overview</a>

      <select id="language-switch">
        <option value="en">🇬🇧 EN</option>
        <option value="nl">🇳🇱 NL</option>
      </select>
    </nav>

    <main class="container">
      <section class="card">
        <h2 data-translate="overviewTitle">Overview</h2>

        <div class="filter-buttons">
          <button data-filter="all" data-translate="all">All</button>
          <button data-filter="day" data-translate="today">Today</button>
          <button data-filter="week" data-translate="week">Week</button>
          <button data-filter="month" data-translate="month">Month</button>
        </div>
      </section>

      <section class="card">
        <h2 data-translate="savedItems">Saved Items</h2>

        <div id="items-lijst"></div>

        <button
          class="reset-btn"
          onclick="resetData()"
          data-translate="deleteAll"
        >
          Delete all
        </button>
      </section>
    </main>

    <script src="public/js/app.js"></script>
    <script src="public/js/language.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("./sw.js")
          .then(() => console.log("Service Worker registered"));
      }
    </script>
  </body>
</html>
