<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Activity | Healthify</title>

    <meta name="theme-color" content="#22c55e" />

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="public/css/style.css" />

    <link rel="apple-touch-icon" href="icons/appicon.png" />
  </head>
  <body>
    <header>
      <h1>💚 Healthify</h1>
      <p data-translate="addSubtitle">Add a new health activity</p>
    </header>

    <nav>
      <a href="index.html" data-translate="home">Home</a>
      <a href="toevoegen.html" data-translate="add">Add</a>
      <a href="overzicht.html" data-translate="overview">Overview</a>

      <select id="language-switch">
        <option value="en">🇬🇧 EN</option>
        <option value="nl">🇳🇱 NL</option>
      </select>
    </nav>

    <main class="container">
      <section class="card">
        <h2 data-translate="addActivity">Add Activity</h2>

        <form id="health-form">
          <label for="datum" data-translate="date"> Date </label>
          <input type="date" id="datum" required />

          <label for="categorie" data-translate="category"> Category </label>

          <select id="categorie" required>
            <option value="Exercise">🏃 Exercise</option>
            <option value="Nutrition">🍎 Nutrition</option>
            <option value="Sleep">😴 Sleep</option>
            <option value="Water">💧 Water</option>
          </select>

          <label for="omschrijving" data-translate="description">
            Description
          </label>
          <input
            type="text"
            id="omschrijving"
            placeholder="Example: Running"
            required
          />

          <label for="waarde" data-translate="value"> Value </label>
          <input type="number" id="waarde" placeholder="30" required />

          <button type="submit" data-translate="save">Save</button>
        </form>
      </section>
    </main>

    <script src="public/js/app.js"></script>
    <script src="public/js/language.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("./sw.js");
      }
    </script>
  </body>
</html>
