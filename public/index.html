<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Healthify</title>

    <meta name="theme-color" content="#22c55e" />

    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="public/css/style.css" />

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Healthify" />
    <link rel="apple-touch-icon" href="icons/appicon.png" />
  </head>

  <body>
    <header>
      <h1>💚 Healthify</h1>
      <p data-translate="subtitle">Track your health and fitness goals</p>
    </header>

    <nav>
      <a href="index.html" data-translate="home"> Home </a>

      <a href="toevoegen.html" data-translate="add"> Add </a>

      <a href="overzicht.html" data-translate="overview"> Overview </a>

      <select id="language-switch">
        <option value="en">🇬🇧 EN</option>
        <option value="nl">🇳🇱 NL</option>
      </select>
    </nav>

    <main class="container">
      <section class="card">
        <h2 data-translate="welcome">Welcome</h2>

        <p data-translate="welcomeText">
          Healthify helps you track your daily activities, fitness, sleep and
          nutrition.
        </p>
      </section>

      <section class="card">
        <h2 data-translate="stats">Quick Statistics</h2>

        <p>
          <span data-translate="entries"> Total Entries </span>:
          <span id="total-items">0</span>
        </p>
      </section>

      <section class="card">
        <h2 data-translate="categories">Categories</h2>

        <ul>
          <li>🏃 Exercise</li>
          <li>🍎 Nutrition</li>
          <li>😴 Sleep</li>
          <li>💧 Water</li>
        </ul>
      </section>
    </main>

    <script src="public/js/app.js"></script>
    <script src="public/js/language.js"></script>

    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .register("./sw.js")
          .then(() => console.log("Service Worker registered"));
      }
    </script>
  </body>
</html>
